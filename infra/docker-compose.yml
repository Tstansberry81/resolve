services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resolve
      POSTGRES_USER: resolve
      POSTGRES_PASSWORD: resolve-local-only
    ports:
      - "5432:5432"
    volumes:
      - resolve-postgres:/var/lib/postgresql/data
      - ./postgres/001_control_plane.sql:/docker-entrypoint-initdb.d/001_control_plane.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolve -d resolve"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - resolve-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  control-plane:
    build: ../services/control_plane
    environment:
      DATABASE_URL: postgresql+asyncpg://resolve:resolve-local-only@postgres:5432/resolve
      REDIS_URL: redis://redis:6379/0
      RESOLVE_CONFIG_DIR: /config
    volumes:
      - ../config:/config:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ../services/control_plane
    command: ["python", "-m", "resolve_control_plane.worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://resolve:resolve-local-only@postgres:5432/resolve
      REDIS_URL: redis://redis:6379/0
      RESOLVE_CONFIG_DIR: /config
    volumes:
      - ../config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  resolve-postgres:
  resolve-redis:
